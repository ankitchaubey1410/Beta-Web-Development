<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Specificity & Cascade</title>
    <style>
        /* The specificity of this selector is 1 */
        h1 {
            color: aqua;
        }
        /* The specificity of this selector is 10 */
        .cpurple {
            color: purple;
        /* The specificity of this selector is 10 */
        }
        /* in same selector , the last ones will overwrite the others */

        /* The specificity of this selector is 10 */
        .cred {
            color: red;
        }
        /* The specificity of this selector is 1 + 10 = 11 , element + class */
        h1.yellow {
            color: yellow;
            /* color: blue !important; */
            /* !important can overwrite incline css */
        }

        /* This is an example of attribute selector . The specificity of this selector is 10 */
        [data-x=a]{
            /* background-color: rebeccapurple; */
            color: rebeccapurple;
        }
        
        /* The specificity of this selector is 1 + 10 + 10 +10 + 10 = 41 , element + class + class + attribute + pseudo */
        a.harryclass.rohan-class[href]:hover {
            color: orchid;
        }
    </style>
</head>

<body>
    <!-- Specificity Hierarchy - Inline Style > ID Selector > Class/Attribute/Pseudo-class > Element Selector > Universal Selector -->
    <div>
        <h1 " class="yellow cred cpurple" data-x="a">CSS Specificity</h1>
        <!-- <h1 style="color: magenta;" class="yellow cred cpurple">CSS Specificity</h1> -->
    </div>
</body>

</html>
