<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styling Lists using CSS</title>
    <style>
        nav ul li{
            list-style: devanagari;
            /* list-style-type: "🫦"; */
            /* background-color: blueviolet; */
            /* list-style-position: inside; */
            border: 2px solid rebeccapurple;
            list-style: disc inside url(https://media1.tenor.com/m/FkxL37paP04AAAAd/ada-wong-resident-evil-4.gif) ;
            /* list-style-image: url(https://media1.tenor.com/m/1hBTZQzsU2kAAAAd/ada-wong.gif); */
        }
    </style>
</head>
<body>
    <!-- shift+alt+down-key - for copy -->
    <nav>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </nav>
</body>
</html>
