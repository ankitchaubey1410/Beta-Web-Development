<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position Property</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            height: 133px;
            width: 80vw;
            padding: 3px;
            margin:3px;
            border: 2px solid black;
        }

        .box1{
            background-color:lightsteelblue;
            /* position: relative; */
            /* it means that elements remains in it normal position but change its position without changing the other elements */
            /* z-index: 1; */
            /* it is used to overwrite something */
            
            position: absolute;
            top: 0px;
            /* left: 0px; */
            /* in this element is placed relatively to its nearest positioned ancestor , .parent{} -> <body> -> <!DOCTYPE html> */
        }
        .box2{
            background-color: orangered;
            /* position: relative; */
            /* top: -40px; */
            /* left: 34px; */
            /* top: 34px; */
            /* left: 56px; */
        }
        .box3{
            background-color:darkseagreen;
        }
        .box4{
            background-color: crimson;
        }
        .parent{
            margin: 43px;
            padding: 34px;
            border: 3px solid purple;
            position: absolute;
        }
    </style>
</head> 
<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>    
</body>
</html>
